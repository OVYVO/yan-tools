# 推送到默认分支后构建并部署到 GitHub Pages（需在仓库 Settings → Pages → Source 选择 GitHub Actions）
name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set Vite base & site URL for GitHub Pages
        env:
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
        run: |
          REPO_LC=$(echo "$REPO" | tr '[:upper:]' '[:lower:]')
          EXPECTED=$(echo "$OWNER.github.io" | tr '[:upper:]' '[:lower:]')
          if [ "$REPO_LC" = "$EXPECTED" ]; then
            echo "VITE_BASE=/" >> "$GITHUB_ENV"
            echo "VITE_SITE_URL=https://${OWNER}.github.io" >> "$GITHUB_ENV"
          else
            echo "VITE_BASE=/${REPO}/" >> "$GITHUB_ENV"
            echo "VITE_SITE_URL=https://${OWNER}.github.io/${REPO}" >> "$GITHUB_ENV"
          fi

      - name: Build
        run: pnpm exec vite build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
